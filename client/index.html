<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="Online theological education platform for Cross Life School of Divinity" />
    <meta name="theme-color" content="#1e3a8a" />
    <title>Cross Life School of Divinity</title>
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://learn.crosslifeschoolofdivinity.org/" />
    <meta property="og:title" content="Cross Life School of Divinity - CLAC Accredited Theological Education" />
    <meta property="og:description" content="Affordable, accessible theological education. Earn CLAC-accredited certificates in ministry, chaplaincy, and biblical studies." />
    <meta property="og:image" content="https://learn.crosslifeschoolofdivinity.org/chaplain-promo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://learn.crosslifeschoolofdivinity.org/" />
    <meta property="twitter:title" content="Cross Life School of Divinity - CLAC Accredited Theological Education" />
    <meta property="twitter:description" content="Affordable, accessible theological education. Earn CLAC-accredited certificates in ministry, chaplaincy, and biblical studies." />
    <meta property="twitter:image" content="https://learn.crosslifeschoolofdivinity.org/chaplain-promo.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/logo.png" />
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CLSD" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- iOS Splash Screens -->
    <link rel="apple-touch-startup-image" href="/icon-512.png" />
    
    <!-- Mobile optimization -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
