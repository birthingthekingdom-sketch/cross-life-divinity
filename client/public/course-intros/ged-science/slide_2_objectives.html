<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Objectives</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .slide {
            background: white;
            border-radius: 12px;
            padding: 60px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h2 {
            color: #7c3aed;
            font-size: 36px;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 700;
        }
        .objectives {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .objective {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px;
            background: #f3e8ff;
            border-left: 4px solid #f59e0b;
            border-radius: 6px;
        }
        .objective-icon {
            font-size: 24px;
            flex-shrink: 0;
        }
        .objective-text {
            color: #4b5563;
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="slide">
        <h2>Course Objectives</h2>
        <div class="objectives">
            <div class="objective">
                <div class="objective-icon">✓</div>
                <div class="objective-text">Understand life science principles and biology</div>
            </div>
            <div class="objective">
                <div class="objective-icon">✓</div>
                <div class="objective-text">Master physical science and chemistry concepts</div>
            </div>
            <div class="objective">
                <div class="objective-icon">✓</div>
                <div class="objective-text">Learn earth and space science</div>
            </div>
            <div class="objective">
                <div class="objective-icon">✓</div>
                <div class="objective-text">Develop scientific reasoning and analysis skills</div>
            </div>
            <div class="objective">
                <div class="objective-icon">✓</div>
                <div class="objective-text">Apply science knowledge to real-world scenarios</div>
            </div>
        </div>
    </div>
</body>
</html>
