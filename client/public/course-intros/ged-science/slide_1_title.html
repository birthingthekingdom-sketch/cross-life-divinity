<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GED Science</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .slide {
            background: white;
            border-radius: 12px;
            padding: 60px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            color: #7c3aed;
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .subtitle {
            color: #f59e0b;
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .description {
            color: #4b5563;
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="icon">🔬</div>
        <h1>GED Science</h1>
        <div class="subtitle">Explore Scientific Concepts</div>
        <p class="description">
            Master the science concepts and reasoning skills needed for the GED Science test. Learn about life science, physical science, and earth science through engaging lessons and practical applications.
        </p>
    </div>
</body>
</html>
