<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What You'll Learn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .slide {
            background: white;
            border-radius: 12px;
            padding: 60px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h2 {
            color: #7c3aed;
            font-size: 36px;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 700;
        }
        .topics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .topic-card {
            background: linear-gradient(135deg, #f3e8ff 0%, #ede9fe 100%);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #f59e0b;
            text-align: center;
        }
        .topic-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .topic-title {
            color: #7c3aed;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="slide">
        <h2>What You'll Learn</h2>
        <div class="topics-grid">
            <div class="topic-card">
                <div class="topic-icon">🧬</div>
                <div class="topic-title">Life Science & Biology</div>
            </div>
            <div class="topic-card">
                <div class="topic-icon">⚛️</div>
                <div class="topic-title">Physical Science</div>
            </div>
            <div class="topic-card">
                <div class="topic-icon">🌍</div>
                <div class="topic-title">Earth & Space Science</div>
            </div>
            <div class="topic-card">
                <div class="topic-icon">🔍</div>
                <div class="topic-title">Scientific Inquiry</div>
            </div>
        </div>
    </div>
</body>
</html>
