<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contemporary Theological Issues</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .slide-container {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #F5F1E8 0%, #FAF8F3 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        
            transform-origin: top left;
            transform: scale(1);
        }
        
        .content-left {
            flex: 1;
            padding-left: 80px;
            z-index: 10;
        }
        
        .content-left h1 {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: #2C1810;
            line-height: 1.1;
            margin-bottom: 20px;
        }
        
        .content-left h2 {
            font-family: 'Lato', sans-serif;
            font-size: 28px;
            font-weight: 400;
            color: #1B5E20;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        
        .content-left p {
            font-family: 'Lato', sans-serif;
            font-size: 18px;
            color: #5C3D2E;
            line-height: 1.6;
            max-width: 500px;
        }
        
        .decorative-right {
            flex: 0 0 400px;
            min-height: 100vh;
            background: linear-gradient(135deg, #1B5E20 0%, #81C784 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .accent-shape-1 {
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: 80px;
            right: 60px;
        }
        
        .accent-shape-2 {
            position: absolute;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            bottom: 120px;
            right: 120px;
        }
        
        .accent-line {
            position: absolute;
            width: 4px;
            height: 150px;
            background: rgba(255, 255, 255, 0.3);
            left: 80px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .icon-text {
            position: absolute;
            bottom: 60px;
            right: 80px;
            text-align: center;
            z-index: 20;
        }
        
        .icon-text p {
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content-left">
            <h1>Contemporary<br>Theological<br>Issues</h1>
            <h2>Engaging Modern Challenges</h2>
            <p>Explore pressing theological questions facing the contemporary church and develop informed Christian responses grounded in tradition and attentive to the present moment.</p>
        </div>
        
        <div class="decorative-right">
            <div class="accent-shape-1"></div>
            <div class="accent-shape-2"></div>
            <div class="accent-line"></div>
            <div class="icon-text">
                <div style="font-size: 48px;">⚡</div>
                <p>Prophetic Witness</p>
            </div>
        </div>
    </div>
</body>
</html>
