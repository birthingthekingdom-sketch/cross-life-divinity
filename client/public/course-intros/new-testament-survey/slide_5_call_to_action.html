<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - New Testament Survey</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .slide-container { 
            width: 100%; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 60px 40px;
        }
        .content { 
            text-align: center; 
            max-width: 700px;
        }
        .heading { 
            font-family: 'Merriweather', serif; 
            font-size: 48px; 
            font-weight: 700; 
            color: #ecf0f1; 
            margin-bottom: 30px;
        }
        .subheading { 
            font-family: 'Open Sans', sans-serif; 
            font-size: 20px; 
            color: #d4a574; 
            margin-bottom: 40px;
            font-weight: 600;
        }
        .description { 
            font-family: 'Open Sans', sans-serif; 
            font-size: 16px; 
            color: #bdc3c7; 
            line-height: 1.8;
            margin-bottom: 50px;
        }
        .button-group { 
            display: flex; 
            gap: 20px; 
            justify-content: center; 
            flex-wrap: wrap;
        }
        .btn { 
            padding: 15px 40px;
            font-family: 'Open Sans', sans-serif;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #d4a574 0%, #c9956f 100%);
            color: #2c3e50;
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(212, 165, 116, 0.3);
        }
        .btn-secondary { 
            background: transparent;
            color: #d4a574;
            border: 2px solid #d4a574;
        }
        .btn-secondary:hover { 
            background: rgba(212, 165, 116, 0.1);
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content">
            <h2 class="heading">Ready to Explore?</h2>
            <p class="subheading">Begin Your New Testament Journey Today</p>
            <p class="description">Join thousands of students discovering the power and relevance of Christ's message. This comprehensive survey will equip you to understand, teach, and live out the transformative truths of the New Testament.</p>
            <div class="button-group">
                <button class="btn btn-primary">Enroll Now</button>
                <button class="btn btn-secondary">Learn More</button>
            </div>
        </div>
    </div>
</body>
</html>
