<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GED Mathematical Reasoning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .slide {
            background: white;
            border-radius: 12px;
            padding: 60px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            color: #1e40af;
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .subtitle {
            color: #f59e0b;
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .description {
            color: #4b5563;
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="icon">📐</div>
        <h1>GED Mathematical Reasoning</h1>
        <div class="subtitle">Master Essential Math Skills</div>
        <p class="description">
            Prepare for the GED Mathematical Reasoning test with comprehensive lessons covering algebra, geometry, data analysis, and problem-solving strategies.
        </p>
    </div>
</body>
</html>
