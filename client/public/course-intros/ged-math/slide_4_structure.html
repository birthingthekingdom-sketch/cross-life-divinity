<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Structure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .slide {
            background: white;
            border-radius: 12px;
            padding: 60px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h2 {
            color: #1e40af;
            font-size: 36px;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 700;
        }
        .structure {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .module {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
            border-left: 4px solid #f59e0b;
        }
        .module-number {
            background: #1e40af;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }
        .module-text {
            color: #4b5563;
            font-size: 16px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="slide">
        <h2>Course Structure</h2>
        <div class="structure">
            <div class="module">
                <div class="module-number">1</div>
                <div class="module-text">Foundational Concepts & Number Systems</div>
            </div>
            <div class="module">
                <div class="module-number">2</div>
                <div class="module-text">Algebra & Equations</div>
            </div>
            <div class="module">
                <div class="module-number">3</div>
                <div class="module-text">Geometry & Spatial Reasoning</div>
            </div>
            <div class="module">
                <div class="module-number">4</div>
                <div class="module-text">Data Analysis & Statistics</div>
            </div>
            <div class="module">
                <div class="module-number">5</div>
                <div class="module-text">Practice Tests & Review</div>
            </div>
        </div>
    </div>
</body>
</html>
