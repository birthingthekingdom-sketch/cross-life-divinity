<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capstone Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: linear-gradient(135deg, #F5F1E8 0%, #FAF8F3 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        
        .content-left {
            flex: 1;
            padding-left: 80px;
            z-index: 10;
        }
        
        .content-left h1 {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: #2C1810;
            line-height: 1.1;
            margin-bottom: 20px;
        }
        
        .content-left h2 {
            font-family: 'Lato', sans-serif;
            font-size: 28px;
            font-weight: 400;
            color: #8B4513;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        
        .content-left p {
            font-family: 'Lato', sans-serif;
            font-size: 18px;
            color: #5C3D2E;
            line-height: 1.6;
            max-width: 500px;
        }
        
        .decorative-right {
            flex: 0 0 400px;
            height: 720px;
            background: linear-gradient(135deg, #D4A574 0%, #8B4513 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .geometric-pattern {
            position: absolute;
            width: 300px;
            height: 300px;
            opacity: 0.3;
        }
        
        .circle-1 {
            width: 200px;
            height: 200px;
            border: 3px solid #F5F1E8;
            border-radius: 50%;
            position: absolute;
            top: 100px;
            right: 80px;
        }
        
        .circle-2 {
            width: 150px;
            height: 150px;
            border: 2px solid #F5F1E8;
            border-radius: 50%;
            position: absolute;
            bottom: 120px;
            right: 150px;
            opacity: 0.6;
        }
        
        .accent-line {
            position: absolute;
            height: 4px;
            background: #F5F1E8;
            width: 120px;
            bottom: 200px;
            right: 100px;
        }
        
        .icon-text {
            position: absolute;
            bottom: 60px;
            right: 80px;
            text-align: center;
            z-index: 20;
        }
        
        .icon-text p {
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            color: #F5F1E8;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content-left">
            <h1>Capstone<br>Project</h1>
            <h2>Culminating M.Div. Experience</h2>
            <p>Synthesize your theological learning and demonstrate scholarly competency through a meaningful independent project that bridges academic study and vocational ministry.</p>
        </div>
        
        <div class="decorative-right">
            <div class="circle-1"></div>
            <div class="circle-2"></div>
            <div class="accent-line"></div>
            <div class="icon-text">
                <div style="font-size: 48px; color: #F5F1E8;">📚</div>
                <p>Scholarly Excellence</p>
            </div>
        </div>
    </div>
</body>
</html>
