<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christology</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: linear-gradient(135deg, #F5F1E8 0%, #FAF8F3 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .decorative-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(90deg, transparent 0%, #C9A961 50%, transparent 100%);
            opacity: 0.3;
        }
        
        .content {
            text-align: center;
            z-index: 10;
            padding: 0 60px;
        }
        
        .content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: #2C1810;
            line-height: 1.1;
            margin-bottom: 20px;
        }
        
        .content h2 {
            font-family: 'Lato', sans-serif;
            font-size: 28px;
            font-weight: 400;
            color: #6B4423;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        
        .content p {
            font-family: 'Lato', sans-serif;
            font-size: 18px;
            color: #5C3D2E;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .decorative-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(90deg, transparent 0%, #C9A961 50%, transparent 100%);
            opacity: 0.3;
        }
        
        .spiritual-accent {
            position: absolute;
            width: 2px;
            height: 120px;
            background: #6B4423;
            opacity: 0.4;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            margin-left: -200px;
        }
        
        .spiritual-accent-right {
            position: absolute;
            width: 2px;
            height: 120px;
            background: #6B4423;
            opacity: 0.4;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            margin-left: 200px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="decorative-top"></div>
        <div class="spiritual-accent"></div>
        <div class="spiritual-accent-right"></div>
        
        <div class="content">
            <h1>Christology</h1>
            <h2>The Person and Work of Jesus Christ</h2>
            <p>A systematic exploration of who Jesus Christ is, what He accomplished, and what His incarnation, atonement, and resurrection mean for Christian faith, worship, and mission.</p>
        </div>
        
        <div class="decorative-bottom"></div>
    </div>
</body>
</html>
